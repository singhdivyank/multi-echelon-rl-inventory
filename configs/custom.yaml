environment:
  max_steps_per_episode: 365

agent:
  hidden_size: 64
  n_layers: 3
  lr: 0.00001
  gamma: 0.99
  gae_lambda: 0.95
  entropy_coef: 0.02
  value_loss_coef: 0.5
  max_grad_norm: 0.5
  device: 'auto'

training:
  n_episodes: 15000
  max_steps_per_episode: 365
  update_frequency: 1
  eval_frequency: 5000
  n_eval_episodes: 100
  save_frequency: 5000

baseline:
  tune: true
  tuning_episodes: 10
  tuning_maxiter: 50

evaluation:
  n_episodes: 1000
  deterministic: true

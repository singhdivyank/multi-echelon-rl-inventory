ppo:
  # training parameters
  iterations: 5000
  # network architecture
  hidden_layers: [64, 64]
  activation: tanh
  weight_init: glorot_uniform
  # PPO specific
  buffer_size: 512
  batch_size: 64
  update_epochs: 5
  learning_rate: 3e-4
  gamma: 0.95
  gae_lambda: 0.95
  epsilon: 0.2
  # optimization
  normalize_advantages: True
  clip_grad_norm: True
  max_grad_norm: 0.5
  value_loss_coef: 0.25
  entropy_coef: 0.005
  # logging
  log_interval: 100
  save_interval: 1000
  eval_interval: 500
  eval_episodes: 100
  # Reproducibility
  seed: 42

general:
  seed: 42
  save_dir: './results'
  device: 'auto'